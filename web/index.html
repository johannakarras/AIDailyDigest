      "abstract": "In this work, we propose Mutual Forcing, a framework for fast autoregressive audio-video generation with long-horizon audio-video synchronization. Our approach addresses two key challenges: joint audio-video modeling and fast autoregressive generation. To ease joint audio-video optimization, we adopt a two-stage training strategy: we first train uni-modal generators and then couple them into a unified audio-video model for joint training on paired data. For streaming generation, we ask whether a native fast causal audio-video model can be trained directly, instead of following existing streaming distillation pipelines that typically train a bidirectional model first and then convert it into a causal generator through multiple distillation stages. Our answer is Mutual Forcing, which builds directly on native autoregressive model and integrates few-step and multi-step generation within a single weight-shared model, enabling self-distillation and improved training-inference consistency. The multi-step mode improves the few-step mode via self-distillation, while the few-step mode generates historical context during training to improve training-inference consistency; because the two modes share parameters, these two effects reinforce each other within a single model. Compared with prior approaches such as Self-Forcing, Mutual Forcing removes the need for an additional bidirectional teacher model, supports more flexible training sequence lengths, reduces training overhead, and allows the model to improve directly from real paired data rather than a fixed teacher. Experiments show that Mutual Forcing matches or surpasses strong baselines that require around 50 sampling steps while using only 4 to 8 steps, demonstrating substantial advantages in both efficiency and quality. The project page is available at https://mutualforcing.github.io.",

      "abstract": "Recent advances in 4D content generation have attracted increasing attention, yet creating high-quality animated 3D models remains challenging due to the complexity of modeling spatio-temporal distributions and the scarcity of 4D training data. We present AnimateAnyMesh++, a feed-forward framework for text-driven animation of arbitrary 3D meshes with substantial upgrades in data, architecture, and generative capability. First, we expand the DyMesh-XL dataset by mining dynamic content from Objaverse-XL, increasing the number of unique identities from 60K to 300K and substantially broadening category and motion diversity. Second, we redesign DyMeshVAE-Flex with power-law topology-aware attention and vertex-normal enhanced features, which significantly improves trajectory reconstruction, local geometry preservation, and mitigates trajectory-sticking artifacts. Third, we introduce architectural changes to both DyMeshVAE-Flex and the rectified-flow (RF) generator to support variable-length sequence training and generation, enabling longer animations while preserving reconstruction fidelity. Extensive experiments demonstrate that AnimateAnyMesh++ generates semantically accurate and temporally coherent mesh animations within seconds, surpassing prior approaches in quality and efficiency. The enlarged DyMesh-XL, the upgraded DyMeshVAE-Flex, and variable-length RF together deliver consistent gains across benchmarks and in-the-wild meshes. We will release code, models, and the expanded DyMesh-XL upon acceptance of this manuscript to facilitate research in 4D content creation.",

      "abstract": "Existing talking avatar methods typically adopt an image-to-video pipeline conditioned on a static reference image within the same scene as the target generation. This restricted, single-view perspective lacks sufficient temporal and expression cues, limiting the ability to synthesize high-fidelity talking avatars in customized backgrounds. To this end, we introduce Talking Avatar generation from Video Reference (TAVR), a novel framework that shifts the paradigm by leveraging cross-scene video inputs. To effectively process these extended temporal contexts and bridge cross-scene domain gaps, TAVR integrates a token selection module alongside a comprehensive three-stage training scheme. Specifically, same-scene video pretraining establishes foundational appearance copying, which is subsequently expanded by cross-scene reference fine-tuning for robust cross-scene adaptation. Finally, task-specific reinforcement learning aligns the generated outputs with identity-based rewards to maximize identity similarity. To systematically evaluate cross-scene robustness, we construct a new benchmark comprising 158 carefully curated cross-scene video pairs. Extensive experiments show that TAVR benefits from flexible inference-time video referencing and consistently surpasses existing baselines both quantitatively and qualitatively. This work has been deployed to production. For more related research, please visit \\href{https://www.heygen.com/research}{HeyGen Research} and \\href{https://www.heygen.com/research/avatar-v-model}{HeyGen Avatar-V}.",

      "abstract": "Diffusion-based models decompose sampling into many small Gaussian denoising steps -- an assumption that breaks down when generation is compressed to a few coarse transitions. Existing few-step methods address this through distillation, consistency training, or adversarial objectives, but sacrifice the likelihood framework in the process. We introduce Normalizing Trajectory Models (NTM), which models each reverse step as an expressive conditional normalizing flow with exact likelihood training. Architecturally, NTM combines shallow invertible blocks within each step with a deep parallel predictor across the trajectory, forming an end-to-end network trainable from scratch or initializable from pretrained flow-matching models. Its exact trajectory likelihood further enables self-distillation: a lightweight denoiser trained on the model's own score produces high-quality samples in four steps. On text-to-image benchmarks, NTM matches or outperforms strong image generation baselines in just four sampling steps while uniquely retaining exact likelihood over the generative trajectory.",

      "title": "Generative Modeling with Flux Matching",
      "abstract": "We introduce Flux Matching, a new paradigm for generative modeling that generalizes existing score-based models to a broader family of vector fields that need not be conservative. Rather than requiring the model to equal the data score, the Flux Matching objective imposes a weaker condition that admits infinitely many vector fields whose stationary distribution is the data. This flexibility enables a class of generative models that cannot be learned under score matching, in which inductive biases, structural priors, and properties of the dynamics can be directly imposed or optimized. We show that Flux Matching performs strongly on high-dimensional image datasets and, more importantly, that our added freedom unlocks a range of applications including faster sampling, interpretable and mechanistic models, and dynamics that encode directed dependencies between variables. More broadly, Flux Matching opens a new dimension in generative modeling by turning the vector field itself into a design choice rather than a fixed target. Code is available at https://github.com/peterpaohuang/flux_matching.",

const MONTH_NAMES = [
  "January", "February", "March", "April", "May", "June",
  "July", "August", "September", "October", "November", "December"
];
const MONTH_SHORT = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function isWeekKey(key) {
  return /^\d{4}-W\d{2}$/.test(key);
}

// Returns the Monday Date of an ISO week key like "2026-W18"
function weekKeyToMonday(weekKey) {
  const [yearStr, weekStr] = weekKey.split("-W");
  const year = parseInt(yearStr, 10);
  const week = parseInt(weekStr, 10);
  // Jan 4 is always in ISO week 1
  const jan4 = new Date(year, 0, 4);
  const dayOfWeek = (jan4.getDay() + 6) % 7; // 0=Mon … 6=Sun
  const monday = new Date(jan4);
  monday.setDate(jan4.getDate() - dayOfWeek + (week - 1) * 7);
  return monday;
}

function formatWeekLabel(weekKey) {
  const mon = weekKeyToMonday(weekKey);
  const fri = new Date(mon);
  fri.setDate(mon.getDate() + 4);
  if (mon.getMonth() === fri.getMonth()) {
    return `${MONTH_SHORT[mon.getMonth()]} ${mon.getDate()}–${fri.getDate()}`;
  }
  return `${MONTH_SHORT[mon.getMonth()]} ${mon.getDate()}–${MONTH_SHORT[fri.getMonth()]} ${fri.getDate()}`;
}

function formatWeekHeading(weekKey) {
  const mon = weekKeyToMonday(weekKey);
  const fri = new Date(mon);
  fri.setDate(mon.getDate() + 4);
  if (mon.getMonth() === fri.getMonth()) {
    return `${MONTH_NAMES[mon.getMonth()]} ${mon.getDate()}–${fri.getDate()}, ${mon.getFullYear()}`;
  }
  return `${MONTH_NAMES[mon.getMonth()]} ${mon.getDate()}–${MONTH_NAMES[fri.getMonth()]} ${fri.getDate()}, ${mon.getFullYear()}`;
}

function formatDate(dateKey) {
  const [year, month, day] = dateKey.split("-").map(Number);
  return `${MONTH_NAMES[month - 1]} ${day}, ${year}`;
}

// Returns {year, month (0-padded string), displayLabel} for any key type
function keyMeta(key) {
  if (isWeekKey(key)) {
    const m = weekKeyToMonday(key);
    return {
      year: String(m.getFullYear()),
      month: String(m.getMonth() + 1).padStart(2, "0"),
      label: formatWeekLabel(key),
    };
  }
  const [year, month, day] = key.split("-");
  return { year, month, label: formatDate(key) };
}

function buildSidebar(digests) {
  const sidebar = document.getElementById("sidebar");
  const allKeys = Object.keys(digests).sort().reverse();

  if (allKeys.length === 0) {
    const empty = document.createElement("p");
    empty.className = "empty-state";
    empty.textContent = "No digests yet.";
    sidebar.appendChild(empty);
    return;
  }

  const byYear = {};
  for (const key of allKeys) {
    const { year, month, label } = keyMeta(key);
    if (!byYear[year]) byYear[year] = {};
    if (!byYear[year][month]) byYear[year][month] = [];
    byYear[year][month].push({ key, label });
  }

  const years = Object.keys(byYear).sort().reverse();
  const mostRecentYear = years[0];

  for (const year of years) {
    const yearDetails = document.createElement("details");
    yearDetails.className = "year-node";
    if (year === mostRecentYear) yearDetails.open = true;

    const yearSummary = document.createElement("summary");
    yearSummary.textContent = year;
    yearDetails.appendChild(yearSummary);

    const months = Object.keys(byYear[year]).sort().reverse();
    const mostRecentMonth = months[0];

    for (const month of months) {
      const monthDetails = document.createElement("details");
      monthDetails.className = "month-node";
      if (year === mostRecentYear && month === mostRecentMonth) {
        monthDetails.open = true;
      }

      const monthSummary = document.createElement("summary");
      monthSummary.textContent = MONTH_NAMES[Number(month) - 1];
      monthDetails.appendChild(monthSummary);

      for (const { key, label } of byYear[year][month]) {
        const span = document.createElement("span");
        span.className = "day-link";
        span.dataset.date = key;
        span.textContent = label;
        span.addEventListener("click", () => selectDate(key));
        monthDetails.appendChild(span);
      }

      yearDetails.appendChild(monthDetails);
    }

    sidebar.appendChild(yearDetails);
  }
}

function closeSidebar() {
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("sidebar-overlay").classList.remove("visible");
}

function selectDate(dateKey) {
  document.querySelectorAll(".day-link").forEach(el => {
    el.classList.toggle("active", el.dataset.date === dateKey);
  });
  renderDigest(dateKey);
  if (window.innerWidth <= 640) closeSidebar();
}

function renderDigest(dateKey) {
  const dateHeading = document.getElementById("date-heading");
  dateHeading.textContent = isWeekKey(dateKey) ? formatWeekHeading(dateKey) : formatDate(dateKey);

  const cardsContainer = document.getElementById("cards-container");
  cardsContainer.innerHTML = "";

  const rawPapers = DIGESTS[dateKey];
  if (!rawPapers || rawPapers.length === 0) {
    const empty = document.createElement("p");
    empty.className = "empty-state";
    empty.textContent = "No papers in this digest.";
    cardsContainer.appendChild(empty);
    return;
  }

  const papers = rawPapers.slice().sort((a, b) => (b.stars || 0) - (a.stars || 0));

  for (const paper of papers) {
    const card = document.createElement("div");
    card.className = "paper-card";

    const details = document.createElement("details");

    // --- Summary (always visible) ---
    const summary = document.createElement("summary");

    const summaryLeft = document.createElement("div");
    summaryLeft.className = "paper-summary-left";

    const titleRow = document.createElement("div");
    titleRow.className = "paper-title-row";

    const titleEl = document.createElement("p");
    titleEl.className = "paper-title";
    const link = document.createElement("a");
    link.href = paper.url || "#";
    link.target = "_blank";
    link.rel = "noopener noreferrer";
    link.textContent = paper.title || "(no title)";
    link.addEventListener("click", e => e.stopPropagation());
    titleEl.appendChild(link);
    titleRow.appendChild(titleEl);

    if (paper.stars) {
      const starsEl = document.createElement("span");
      starsEl.className = "paper-stars";
      starsEl.title = paper.rating_rationale || "";
      starsEl.textContent = "⭐".repeat(paper.stars);
      titleRow.appendChild(starsEl);
    }

    summaryLeft.appendChild(titleRow);

    if (paper.authors && paper.authors.length) {
      const authorsEl = document.createElement("p");
      authorsEl.className = "paper-authors";
      authorsEl.textContent = paper.authors.join(", ");
      summaryLeft.appendChild(authorsEl);
    }

    if (paper.affiliations && paper.affiliations.length) {
      const affEl = document.createElement("p");
      affEl.className = "paper-affiliations";
      affEl.textContent = paper.affiliations.join(", ");
      summaryLeft.appendChild(affEl);
    }

    summary.appendChild(summaryLeft);

    const arrow = document.createElement("span");
    arrow.className = "paper-toggle-icon";
    arrow.textContent = "▼";
    summary.appendChild(arrow);

    details.appendChild(summary);

    // --- Body (shown when expanded) ---
    const body = document.createElement("div");
    body.className = "paper-body";

    const meta = document.createElement("p");
    meta.className = "paper-meta";
    const metaParts = [];
    if (paper.date) metaParts.push(paper.date);
    if (paper.source) metaParts.push(`via ${paper.source}`);
    meta.textContent = metaParts.join(" · ");
    body.appendChild(meta);

    const fields = [
      { label: "What it does", key: "description" },
      { label: "Novel contribution", key: "contribution" },
      { label: "Limitations", key: "limitations" },
    ];

    for (const { label, key } of fields) {
      if (!paper[key]) continue;
      const labelEl = document.createElement("p");
      labelEl.className = "field-label";
      labelEl.textContent = label;
      body.appendChild(labelEl);

      const valueEl = document.createElement("p");
      valueEl.className = "field-value";
      valueEl.textContent = paper[key];
      body.appendChild(valueEl);
    }

    if (paper.links && paper.links.length) {
      const labelEl = document.createElement("p");
      labelEl.className = "field-label";
      labelEl.textContent = "Links";
      body.appendChild(labelEl);

      const linksEl = document.createElement("div");
      linksEl.className = "paper-links";
      for (const { label, url } of paper.links) {
        const a = document.createElement("a");
        a.className = "paper-link";
        a.href = url;
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        a.textContent = label;
        linksEl.appendChild(a);
      }
      body.appendChild(linksEl);
    }

    details.appendChild(body);
    card.appendChild(details);
    cardsContainer.appendChild(card);
  }
}

document.addEventListener("DOMContentLoaded", () => {
  buildSidebar(DIGESTS);
  const mostRecent = Object.keys(DIGESTS).sort().reverse()[0];
  if (mostRecent) selectDate(mostRecent);

  const toggle = document.getElementById("sidebar-toggle");
  const sidebar = document.getElementById("sidebar");
  const overlay = document.getElementById("sidebar-overlay");

  toggle.addEventListener("click", () => {
    const isOpen = sidebar.classList.toggle("open");
    overlay.classList.toggle("visible", isOpen);
  });

  overlay.addEventListener("click", closeSidebar);
});
